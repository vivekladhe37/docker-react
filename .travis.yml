sudo: required
services:
 - docker

before_install:
  - docker build -t vivekliladharladhe37/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true vivekliladharladhe37/docker-react npm run test

deploy:
  provider: elasticbeanstalk
  region: "ca-central-1"
  app: "docker"
  env: "Docker-env"
  bucket_name: "elasticbeanstalk-ca-central-1-306476627547"
  bucker_path: "docker"
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: "$AWS_SECRET_KEY"

